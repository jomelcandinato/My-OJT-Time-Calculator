<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes"
    />
    <title>Internship DTR Calculator</title>
    <style>
      /* (all existing styles remain untouched) */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(145deg, #0b1120 0%, #19223a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .tracker-card {
        width: 100%;
        max-width: 1300px;
        background: rgba(18, 26, 40, 0.8);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(90, 140, 255, 0.15);
        border-radius: 2.5rem;
        padding: 1.8rem 1.5rem 2.2rem;
        box-shadow:
          0 25px 50px -12px rgba(0, 0, 0, 0.8),
          0 0 0 1px rgba(160, 200, 255, 0.1) inset;
        transition: box-shadow 0.3s ease;
      }

      .tracker-card:hover {
        box-shadow:
          0 30px 60px -12px #020617,
          0 0 0 1px #3b71f0 inset;
      }

      h1 {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        font-weight: 500;
        font-size: 2.2rem;
        letter-spacing: -0.5px;
        color: #f0f4ff;
        margin-bottom: 0.25rem;
        flex-wrap: wrap;
      }

      h1 span {
        background: linear-gradient(135deg, #a6c9ff, #5f9aff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: 600;
      }

      .sub {
        color: #9bb3da;
        font-size: 0.9rem;
        margin-left: 0.3rem;
        margin-bottom: 1.8rem;
        border-left: 3px solid #3f6ef0;
        padding-left: 1rem;
        font-weight: 350;
      }

      .input-panel {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        gap: 1rem;
        background: rgba(23, 38, 63, 0.6);
        border-radius: 2rem;
        padding: 1.5rem 1.5rem;
        margin-bottom: 2.2rem;
        border: 1px solid #2a3a60;
        transition: 0.2s;
      }

      .input-field {
        flex: 1 1 160px;
        min-width: 140px;
      }

      .input-field label {
        display: block;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 500;
        color: #a2bfed;
        margin-bottom: 0.3rem;
      }

      .input-field input {
        width: 100%;
        background: #0f1a2f;
        border: 1.5px solid #25344f;
        border-radius: 1.2rem;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        color: #eef4ff;
        transition: all 0.2s ease;
        outline: none;
      }

      .input-field input:focus {
        border-color: #5f8eff;
        box-shadow: 0 0 0 3px rgba(95, 142, 255, 0.25);
        background: #101d36;
      }

      .input-field input[type="time"]::-webkit-calendar-picker-indicator {
        filter: invert(0.8) sepia(1) hue-rotate(190deg);
        cursor: pointer;
      }

      .btn-group {
        display: flex;
        gap: 0.8rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .btn {
        background: #253860;
        border: none;
        border-radius: 1.5rem;
        padding: 0.75rem 1.8rem;
        font-weight: 500;
        font-size: 0.95rem;
        color: #d6e4ff;
        cursor: pointer;
        transition: 0.2s;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        border: 1px solid #3f5b96;
        box-shadow: 0 6px 12px -8px #010314;
        white-space: nowrap;
      }

      .btn-primary {
        background: linear-gradient(145deg, #3366ff, #254eda);
        color: white;
        border: 1px solid #6b98ff;
        font-weight: 600;
        padding: 0.75rem 2.2rem;
        letter-spacing: 0.3px;
      }

      .btn-primary:hover:not(:disabled) {
        background: linear-gradient(145deg, #4777ff, #2f56e0);
        transform: scale(1.02) translateY(-2px);
        box-shadow: 0 18px 25px -12px #1e3f9a;
      }

      .btn-secondary:hover:not(:disabled) {
        background: #2f4572;
        border-color: #5f7ec9;
        color: white;
        transform: translateY(-1px);
      }

      .btn:active:not(:disabled) {
        transform: scale(0.98);
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        filter: grayscale(0.3);
      }

      .loader-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 1.5rem 0;
        transition: opacity 0.2s;
      }

      .spinner {
        width: 44px;
        height: 44px;
        border: 4px solid rgba(90, 140, 255, 0.2);
        border-top: 4px solid #5f8eff;
        border-radius: 50%;
        animation: spin 0.9s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
        box-shadow: 0 0 15px #3f6ef0;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .table-wrapper {
        border-radius: 1.8rem;
        background: rgba(0, 8, 20, 0.4);
        padding: 0.1rem;
        border: 1px solid #2b3d60;
        overflow-x: auto;
        box-shadow: 0 15px 30px -18px black;
        transition: opacity 0.2s;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 700px;
        color: #e6edff;
      }

      th {
        text-align: left;
        padding: 1rem 0.8rem 1rem 1.2rem;
        font-weight: 500;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        background: #0e1b30;
        color: #b0ceff;
        border-bottom: 2px solid #2b4c8c;
      }

      td {
        padding: 1rem 0.8rem 1rem 1.2rem;
        border-bottom: 1px solid #25344f;
        font-size: 0.95rem;
        background: rgba(12, 22, 40, 0.7);
        transition: background 0.15s;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tbody tr {
        animation: rowPop 0.25s ease-out;
        transform-origin: top;
      }

      @keyframes rowPop {
        0% {
          opacity: 0;
          transform: translateY(-6px) scale(0.98);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      tbody tr:hover td {
        background: #16263f;
      }

      .excess-negative {
        color: #ff9f9f;
        font-weight: 500;
        text-shadow: 0 0 5px rgba(255, 120, 120, 0.3);
      }

      .excess-positive {
        color: #b4f0b4;
        font-weight: 500;
      }

      .total-hrs {
        font-weight: 600;
        color: #cae0ff;
        background: linear-gradient(90deg, #2d3f66, transparent);
        border-radius: 2rem;
        padding: 0.2rem 0.8rem;
        display: inline-block;
        white-space: nowrap;
      }

      .delete-btn {
        background: none;
        border: 1px solid #5d3f6b;
        color: #deb0ff;
        border-radius: 2rem;
        padding: 0.3rem 0.9rem;
        font-size: 0.75rem;
        cursor: pointer;
        transition: 0.15s;
      }

      .delete-btn:hover {
        background: #a63f5a;
        border-color: #ff8a8a;
        color: white;
        transform: scale(1.05);
      }

      .footer-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 2rem;
        flex-wrap: wrap;
        gap: 0.8rem;
      }

      .badge {
        color: #a6c1ff;
        background: #192f4a;
        padding: 0.4rem 1.2rem;
        border-radius: 3rem;
        font-size: 0.85rem;
        border: 1px solid #2f5190;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
      }

      .badge i {
        font-style: normal;
        color: #84a9ff;
        font-weight: 600;
      }

      .clear-all {
        background: rgba(40, 20, 50, 0.6);
        border: 1px solid #673f6b;
        color: #dbaddb;
      }

      .clear-all:hover:not(:disabled) {
        background: #3f2949;
        border-color: #b384c9;
        color: white;
      }

      .stats-group {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
      }

      /* new footer credit style */
      .footer-credit {
        margin-top: 2rem;
        text-align: center;
        color: #5b7bb3;
        font-size: 0.8rem;
        border-top: 1px dashed #2f4572;
        padding-top: 1.2rem;
        letter-spacing: 0.3px;
      }

      .footer-credit span {
        background: #1c2a44;
        padding: 0.2rem 1rem;
        border-radius: 2rem;
        display: inline-block;
      }

      @media screen and (max-width: 600px) {
        .tracker-card {
          padding: 1.5rem 1rem;
          border-radius: 2rem;
        }

        h1 {
          font-size: 1.8rem;
        }

        .sub {
          font-size: 0.8rem;
          margin-bottom: 1.5rem;
        }

        .input-panel {
          padding: 1.2rem 1rem;
          gap: 0.8rem;
        }

        .input-field {
          flex: 1 1 100%;
        }

        .btn-group {
          width: 100%;
        }

        .btn-primary {
          width: 100%;
          padding: 0.8rem;
        }

        th,
        td {
          padding: 0.8rem 0.5rem 0.8rem 0.8rem;
          font-size: 0.85rem;
        }

        th {
          font-size: 0.7rem;
        }

        .total-hrs {
          padding: 0.1rem 0.5rem;
          font-size: 0.8rem;
        }

        .delete-btn {
          padding: 0.2rem 0.6rem;
          font-size: 0.7rem;
        }

        .badge {
          font-size: 0.75rem;
          padding: 0.3rem 1rem;
        }

        .footer-credit {
          margin-top: 1.5rem;
          font-size: 0.7rem;
        }
      }

      @media screen and (max-width: 380px) {
        table {
          min-width: 600px;
        }
      }
    </style>
  </head>
  <body>
    <div class="tracker-card">
      <h1><span>⏱︎ </span> OJT Daily Time Record Calculator</h1>
      <div class="sub">
        Exact Shift: <strong>8:30 – 17:30</strong> <br />Unpaid Break:
        <strong>12:00 – 13:00</strong>
      </div>

      <!-- input form -->
      <div class="input-panel">
        <div class="input-field">
          <label>📅 date</label>
          <input type="date" id="dateInput" value="2026-03-06" />
        </div>
        <div class="input-field">
          <label>🔓 log in</label>
          <input type="time" id="loginInput" value="08:30" step="60" />
        </div>
        <div class="input-field">
          <label>🔒 log out</label>
          <input type="time" id="logoutInput" value="17:30" step="60" />
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" id="addBtn">Calculate Time</button>
        </div>
      </div>

      <!-- loading animation (hidden by default) -->
      <div id="loaderContainer" class="loader-container" style="display: none">
        <div class="spinner"></div>
      </div>

      <!-- table log -->
      <div class="table-wrapper" id="tableWrapper">
        <table>
          <thead>
            <tr>
              <th>date</th>
              <th>log in</th>
              <th>log out</th>
              <th>excess hrs in</th>
              <th>excess hrs out</th>
              <th>total hours rendered</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- dynamic rows injected here -->
          </tbody>
        </table>
      </div>

      <!-- footer actions & counters -->
      <div class="footer-bar">
        <div class="stats-group">
          <div class="badge">
            <span style="font-size: 15px"
              >🗓 Total Days:
              <i id="entryCount" style="font-size: 20px">0</i></span
            >
          </div>
          <div class="badge">
            <span style="font-size: 15px"
              >⏱ Total Hours:
              <i id="totalHoursDisplay" style="font-size: 20px">0h 0m</i></span
            >
          </div>
        </div>
        <button class="btn clear-all" id="clearAllBtn">🗑️ Clear all</button>
      </div>

      <!-- new credit footer (added without altering existing code) -->
      <div class="footer-credit">
        <span>Created by Jomel Candinato</span>
      </div>
    </div>

    <script>
      (function () {
        // fixed office times in minutes
        const OFFICE_IN_MIN = 8 * 60 + 30; // 08:30
        const OFFICE_OUT_MIN = 17 * 60 + 30; // 17:30

        // unpaid break 12:00 – 13:00
        const BREAK_START = 12 * 60; // 12:00
        const BREAK_END = 13 * 60; // 13:00

        // state
        let entries = [];

        // DOM elements
        const dateInput = document.getElementById("dateInput");
        const loginInput = document.getElementById("loginInput");
        const logoutInput = document.getElementById("logoutInput");
        const addBtn = document.getElementById("addBtn");
        const tableBody = document.getElementById("tableBody");
        const entryCountSpan = document.getElementById("entryCount");
        const totalHoursSpan = document.getElementById("totalHoursDisplay");
        const clearAllBtn = document.getElementById("clearAllBtn");
        const loaderContainer = document.getElementById("loaderContainer");
        const tableWrapper = document.getElementById("tableWrapper");

        // helper: parse time "HH:MM" to minutes
        function parseTimeToMinutes(timeStr) {
          if (!timeStr) return NaN;
          const parts = timeStr.split(":");
          if (parts.length < 2) return NaN;
          const hours = parseInt(parts[0], 10);
          const minutes = parseInt(parts[1], 10);
          if (isNaN(hours) || isNaN(minutes)) return NaN;
          return hours * 60 + minutes;
        }

        // format minutes to "Xh Ym" with optional sign
        function formatHoursMinutes(minutes, alwaysShowSign = false) {
          if (isNaN(minutes)) return "?";
          const sign =
            minutes < 0 ? "-" : alwaysShowSign && minutes > 0 ? "+" : "";
          const absMins = Math.abs(minutes);
          const hrs = Math.floor(absMins / 60);
          const mins = absMins % 60;
          return `${sign}${hrs}h ${mins}m`;
        }

        // compute break deduction (overlap with 12:00–13:00)
        function getBreakDeduction(loginStr, logoutStr) {
          const inMin = parseTimeToMinutes(loginStr);
          const outMin = parseTimeToMinutes(logoutStr);
          if (isNaN(inMin) || isNaN(outMin)) return NaN;

          // no overlap if interval ends before break starts or starts after break ends
          if (outMin <= BREAK_START || inMin >= BREAK_END) return 0;

          const overlapStart = Math.max(inMin, BREAK_START);
          const overlapEnd = Math.min(outMin, BREAK_END);
          return Math.max(0, overlapEnd - overlapStart);
        }

        // compute total render (logout - login) minus unpaid break
        function computeTotalMinutes(loginStr, logoutStr) {
          const inMin = parseTimeToMinutes(loginStr);
          const outMin = parseTimeToMinutes(logoutStr);
          if (isNaN(inMin) || isNaN(outMin)) return NaN;

          const rawTotal = outMin - inMin;
          const breakDeduction = getBreakDeduction(loginStr, logoutStr);
          // net total should never be negative, but just in case keep as is
          return rawTotal - breakDeduction;
        }

        // compute excess IN (office_in - actual)
        function computeExcessIn(loginTimeStr) {
          const loginMin = parseTimeToMinutes(loginTimeStr);
          if (isNaN(loginMin)) return NaN;
          return OFFICE_IN_MIN - loginMin;
        }

        // compute excess OUT (actual - office_out)
        function computeExcessOut(logoutTimeStr) {
          const logoutMin = parseTimeToMinutes(logoutTimeStr);
          if (isNaN(logoutMin)) return NaN;
          return logoutMin - OFFICE_OUT_MIN;
        }

        // validate logout after login
        function isValidTimes(loginStr, logoutStr) {
          const inMin = parseTimeToMinutes(loginStr);
          const outMin = parseTimeToMinutes(logoutStr);
          if (isNaN(inMin) || isNaN(outMin)) return false;
          return outMin >= inMin;
        }

        // render table and update totals
        function renderTable() {
          let html = "";
          let totalMinutesSum = 0;

          for (let i = 0; i < entries.length; i++) {
            const e = entries[i];
            const excessInMin = computeExcessIn(e.login);
            const excessOutMin = computeExcessOut(e.logout);
            const totalMin = computeTotalMinutes(e.login, e.logout);

            // accumulate total minutes (ignore invalid entries)
            if (!isNaN(totalMin)) {
              totalMinutesSum += totalMin;
            }

            const excessInStr = formatHoursMinutes(excessInMin, true);
            const excessOutStr = formatHoursMinutes(excessOutMin, true);
            const totalStr = !isNaN(totalMin)
              ? formatHoursMinutes(totalMin, false)
              : "?";

            const inClass =
              excessInMin < 0 ? "excess-negative" : "excess-positive";
            const outClass =
              excessOutMin < 0 ? "excess-negative" : "excess-positive";

            html += `<tr>
                    <td>${e.date || "??"}</td>
                    <td>${e.login}</td>
                    <td>${e.logout}</td>
                    <td class="${inClass}">${excessInStr}</td>
                    <td class="${outClass}">${excessOutStr}</td>
                    <td><span class="total-hrs">${totalStr}</span></td>
                    <td><button class="delete-btn" data-index="${i}">Delete</button></td>
                </tr>`;
          }

          tableBody.innerHTML =
            html ||
            `<tr><td colspan="7" style="text-align:center; color:#8ba0c6; padding:2rem;">No entries yet. Calculate your first record now!</td></tr>`;

          // update total days and total hours
          entryCountSpan.textContent = entries.length;
          totalHoursSpan.textContent = formatHoursMinutes(
            totalMinutesSum,
            false,
          );

          // attach delete events
          document.querySelectorAll(".delete-btn").forEach((btn) => {
            btn.addEventListener("click", (e) => {
              const index = e.target.getAttribute("data-index");
              if (index !== null) deleteEntry(parseInt(index, 10));
            });
          });

          saveToLocalStorage();
        }

        // loading animation control
        function showLoader() {
          loaderContainer.style.display = "flex";
          tableWrapper.style.opacity = "0.5";
          addBtn.disabled = true;
          clearAllBtn.disabled = true;
        }

        function hideLoader() {
          loaderContainer.style.display = "none";
          tableWrapper.style.opacity = "1";
          addBtn.disabled = false;
          clearAllBtn.disabled = false;
        }

        // add entry with loading simulation
        function addEntryWithLoading() {
          const date = dateInput.value;
          const login = loginInput.value;
          const logout = logoutInput.value;

          if (!date || !login || !logout) {
            alert("❌ please fill date, login and logout time");
            return;
          }

          if (!isValidTimes(login, logout)) {
            alert("⏳ logout time must be after login time");
            return;
          }

          showLoader();

          // Simulate short loading for visual feedback (300ms)
          setTimeout(() => {
            // push the new entry
            entries.push({ date, login, logout });
            renderTable();
            hideLoader();
          }, 350);
        }

        // delete single entry
        function deleteEntry(index) {
          if (index >= 0 && index < entries.length) {
            entries.splice(index, 1);
            renderTable();
          }
        }

        // clear all entries
        function clearAll() {
          if (entries.length > 0 && confirm("Delete all time records?")) {
            entries = [];
            renderTable();
          }
        }

        // local storage
        const STORAGE_KEY = "pulseTimeRecords";

        function saveToLocalStorage() {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
          } catch (e) {}
        }

        function loadFromLocalStorage() {
          try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
              const parsed = JSON.parse(saved);
              if (Array.isArray(parsed)) entries = parsed;
            } else {
              entries = [];
            }
          } catch (e) {
            entries = [];
          }
          renderTable();
        }

        // event listeners
        addBtn.addEventListener("click", addEntryWithLoading);

        [dateInput, loginInput, logoutInput].forEach((input) => {
          input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") addEntryWithLoading();
          });
        });

        clearAllBtn.addEventListener("click", clearAll);

        // initialize
        loadFromLocalStorage();
      })();
    </script>
  </body>
</html>
